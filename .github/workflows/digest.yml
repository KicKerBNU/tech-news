name: News Digest Agent

on:
  schedule:
    # GitHub scheduled runs are best-effort — often delayed, sometimes skipped.
    # Primary + backup slots; the agent skips if today's digest already exists.
    - cron: '0 8 * * *'   # primary: 08:00 UTC
    - cron: '0 11 * * *'  # backup:  11:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: Run even if today's digest already exists
        type: boolean
        default: false
  repository_dispatch:
    types: [run-digest]

permissions:
  contents: write   # needed so the workflow can commit the new digest back

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          OTEL_SERVICE_NAME: signal-news-digest
          OTEL_EXPORTER_OTLP_ENDPOINT: https://api.honeycomb.io
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || '' }}
        run: python agent/news_digest.py

      - name: Commit and push if data changed
        id: commit
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@github.com"
          git add digests/data.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No digest changes to commit"
          else
            git commit -m "digest: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send newsletter
        if: steps.commit.outputs.changed == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
          SITE_URL: https://signal-news-agent.netlify.app
        run: python agent/send_newsletter.py

      - name: Post to Telegram
        if: steps.commit.outputs.changed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          SITE_URL: https://signal-news-agent.netlify.app
        run: python agent/send_telegram.py
