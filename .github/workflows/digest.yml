name: News Digest Agent

on:
  schedule:
    
    # timing isn't guaranteed under high platform load — expect small drift.
    #- cron: '*/10 * * * *' # # Every 10 minutes. GitHub's minimum granularity is 5 min, and exact
    #- cron: '0 * * * *' # every hours update
    - cron: '0 8 * * *' # # every day update. 
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the new digest back

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HONEYCOMB_API_KEY: ${{ secrets.HONEYCOMB_API_KEY }}
          OTEL_SERVICE_NAME: signal-news-digest
          OTEL_EXPORTER_OTLP_ENDPOINT: https://api.honeycomb.io
        run: python agent/news_digest.py

      - name: Commit and push if data changed
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@github.com"
          git add digests/data.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
